name: Send reminder pushes

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: reminders-cron
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit cron endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -sS -X POST \
            -H "x-cron-secret: $CRON_SECRET" \
            -w "\nHTTP %{http_code}\n" \
            --max-time 60 \
            https://zap-app-eight.vercel.app/api/cron/send-reminders
